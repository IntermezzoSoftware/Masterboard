name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.1)'
        required: true

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up MSYS2 / MinGW (CGo)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false

      - name: Add MinGW to PATH
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\NSIS"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Extract version
        id: version
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set version in wails.json
        run: |
          sed -i 's/"productVersion": ".*"/"productVersion": "${{ steps.version.outputs.VERSION }}"/' wails.json
        shell: bash

      - name: Generate Windows icons
        run: |
          magick build/appicon.png -define icon:auto-resize=256,128,64,48,32,16 build/windows/icon.ico
          magick build/appicon-white.png -define icon:auto-resize=256,128,64,48,32,16 build/windows/installer-icon.ico
          magick build/pgn-icon.png -define icon:auto-resize=256,128,64,48,32,16 build/windows/pgn-icon.ico
        shell: bash

      - name: Build Windows installer
        run: wails build -platform windows/amd64 -nsis -ldflags "-X github.com/IntermezzoSoftware/Masterboard/internal/version.Current=${{ steps.version.outputs.VERSION }}"
        env:
          CGO_ENABLED: '1'

      - name: Sign installer (if cert available)
        if: env.WINDOWS_CERT_BASE64 != ''
        run: |
          $cert = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          [IO.File]::WriteAllBytes("cert.pfx", $cert)
          signtool sign /f cert.pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "build/bin/Masterboard-amd64-installer.exe"
          Remove-Item cert.pfx
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/Masterboard-amd64-installer.exe
          if-no-files-found: error

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Extract version
        id: version
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT

      - name: Set version in wails.json
        run: |
          sed -i '' 's/"productVersion": ".*"/"productVersion": "${{ steps.version.outputs.VERSION }}"/' wails.json

      - name: Build macOS app
        run: wails build -platform darwin/universal -ldflags "-X github.com/IntermezzoSoftware/Masterboard/internal/version.Current=${{ steps.version.outputs.VERSION }}"

      - name: Verify app bundle was built
        run: |
          test -d build/bin/Masterboard.app || { echo "ERROR: Masterboard.app not found after build"; exit 1; }
          test -f build/bin/Masterboard.app/Contents/MacOS/Masterboard || { echo "ERROR: Masterboard binary not found inside app bundle"; exit 1; }
          echo "App bundle verified: $(du -sh build/bin/Masterboard.app | cut -f1)"

      - name: Codesign app (if cert available)
        if: env.APPLE_TEAM_ID != ''
        run: |
          codesign --deep --force --sign "Developer ID Application: Intermezzo Software ($APPLE_TEAM_ID)" \
            --options runtime \
            "build/bin/Masterboard.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Masterboard" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "Masterboard.app" 175 120 \
            --hide-extension "Masterboard.app" \
            --app-drop-link 425 120 \
            "build/bin/Masterboard-${{ steps.version.outputs.VERSION }}-mac.dmg" \
            "build/bin/Masterboard.app"

      - name: Notarize DMG (if credentials available)
        if: env.APPLE_ID != ''
        run: |
          xcrun notarytool submit "build/bin/Masterboard-${{ steps.version.outputs.VERSION }}-mac.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "build/bin/Masterboard-${{ steps.version.outputs.VERSION }}-mac.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/bin/Masterboard-${{ steps.version.outputs.VERSION }}-mac.dmg

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2 \
            pkg-config \
            gcc
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.0.pc

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Extract version
        id: version
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT

      - name: Build Linux binary
        run: wails build -platform linux/amd64 -tags webkit2_4_1 -ldflags "-X github.com/IntermezzoSoftware/Masterboard/internal/version.Current=${{ steps.version.outputs.VERSION }}"
        env:
          CGO_ENABLED: '1'

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/Masterboard AppDir/usr/bin/Masterboard
          if [ -d build/bin/engines ]; then
            cp -r build/bin/engines AppDir/usr/bin/engines
          fi
          chmod +x AppDir/usr/bin/Masterboard
          cp build/appicon.png AppDir/io.masterboard.app.png
          cp build/linux/flatpak/io.masterboard.app.desktop AppDir/Masterboard.desktop
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/usr/bin/Masterboard" "$@"
          EOF
          chmod +x AppDir/AppRun
          ARCH=x86_64 ./appimagetool AppDir "build/bin/Masterboard-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/bin/Masterboard-x86_64.AppImage

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: version
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[/{n++} n==2{print} n==3{exit}' CHANGELOG.md > /tmp/release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Masterboard v${{ steps.version.outputs.VERSION }}
          draft: true
          body_path: /tmp/release-notes.md
          files: |
            artifacts/windows-installer/Masterboard-amd64-installer.exe
            artifacts/macos-dmg/*.dmg
            artifacts/linux-appimage/Masterboard-x86_64.AppImage
